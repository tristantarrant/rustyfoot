<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>File Manager</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    background: #1a1a2e;
    color: #e0e0e0;
}
.toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #16213e;
    border-bottom: 1px solid #333;
    flex-wrap: wrap;
}
.breadcrumb {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    min-width: 200px;
    font-size: 13px;
}
.breadcrumb a {
    color: #7faaff;
    text-decoration: none;
    cursor: pointer;
}
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb span { color: #666; }
.actions { display: flex; gap: 6px; }
button {
    padding: 6px 14px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #2a2a4a;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
}
button:hover { background: #3a3a5a; }
button.danger:hover { background: #6a2020; }
.file-list {
    width: 100%;
    border-collapse: collapse;
}
.file-list th {
    text-align: left;
    padding: 8px 12px;
    background: #16213e;
    border-bottom: 1px solid #333;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    color: #888;
    user-select: none;
    cursor: pointer;
}
.file-list td {
    padding: 6px 12px;
    border-bottom: 1px solid #222;
}
.file-list tr:hover { background: #222244; }
.file-list tr.selected { background: #2a3a5a; }
.file-name {
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
}
.file-name .icon { font-size: 18px; flex-shrink: 0; }
.file-size { color: #888; font-size: 13px; white-space: nowrap; }
.drop-zone {
    border: 2px dashed #444;
    border-radius: 8px;
    padding: 40px;
    text-align: center;
    margin: 12px;
    color: #666;
    transition: all 0.2s;
}
.drop-zone.active {
    border-color: #7faaff;
    background: #1a2a4a;
    color: #7faaff;
}
.empty-msg {
    padding: 40px;
    text-align: center;
    color: #555;
}
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
    background: #1e1e3e;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 20px;
    min-width: 320px;
}
.modal h3 { margin-bottom: 12px; }
.modal input[type=text] {
    width: 100%;
    padding: 8px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #2a2a4a;
    color: #e0e0e0;
    font-size: 14px;
    margin-bottom: 12px;
}
.modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
.upload-progress {
    display: none;
    padding: 8px 12px;
    background: #1a2a3a;
    border-bottom: 1px solid #333;
    font-size: 13px;
    color: #7faaff;
}
</style>
</head>
<body>

<div class="toolbar">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="actions">
        <button onclick="promptNewFolder()">New Folder</button>
        <button onclick="document.getElementById('file-input').click()">Upload</button>
        <button class="danger" onclick="deleteSelected()">Delete</button>
    </div>
    <input type="file" id="file-input" multiple style="display:none" onchange="uploadFiles(this.files)">
</div>
<div class="upload-progress" id="upload-progress"></div>

<div id="file-list-container"></div>

<div class="drop-zone" id="drop-zone">
    Drop files here to upload
</div>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title">New Folder</h3>
        <input type="text" id="modal-input" placeholder="Name" onkeydown="if(event.key==='Enter')modalConfirm()">
        <div class="btn-row">
            <button onclick="modalCancel()">Cancel</button>
            <button onclick="modalConfirm()">OK</button>
        </div>
    </div>
</div>

<script>
let currentPath = '';
let selected = new Set();
let modalCallback = null;

function api(method, endpoint, body) {
    const opts = { method, headers: {} };
    if (body !== undefined) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
    }
    return fetch(endpoint, opts).then(r => r.json());
}

function formatSize(bytes) {
    if (bytes === 0) return '';
    const units = ['B', 'KB', 'MB', 'GB'];
    let i = 0;
    while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
    return (i === 0 ? bytes : bytes.toFixed(1)) + ' ' + units[i];
}

function navigate(path) {
    currentPath = path || '';
    selected.clear();
    api('GET', '/filebrowser/api/list?path=' + encodeURIComponent(currentPath))
        .then(data => render(data))
        .catch(err => {
            document.getElementById('file-list-container').innerHTML =
                '<div class="empty-msg">Error loading directory</div>';
        });
}

function render(data) {
    // Breadcrumb
    const bc = document.getElementById('breadcrumb');
    let parts = currentPath ? currentPath.split('/').filter(Boolean) : [];
    let html = '<a onclick="navigate(\'\')">Home</a>';
    let accumulated = '';
    for (const p of parts) {
        accumulated += (accumulated ? '/' : '') + p;
        const path = accumulated;
        html += ' <span>/</span> <a onclick="navigate(\'' + path.replace(/'/g, "\\'") + '\')">' + escHtml(p) + '</a>';
    }
    bc.innerHTML = html;

    // File list
    const container = document.getElementById('file-list-container');
    const entries = data.entries || [];
    const dropZone = document.getElementById('drop-zone');

    if (entries.length === 0) {
        container.innerHTML = '';
        dropZone.style.display = 'block';
        return;
    }

    dropZone.style.display = 'none';
    let table = '<table class="file-list"><thead><tr>' +
        '<th style="width:20px"></th>' +
        '<th>Name</th>' +
        '<th style="width:100px">Size</th>' +
        '</tr></thead><tbody>';

    for (const entry of entries) {
        const fullPath = currentPath ? currentPath + '/' + entry.name : entry.name;
        const icon = getIcon(entry.name, entry.is_dir);
        const cls = selected.has(fullPath) ? ' class="selected"' : '';
        table += '<tr' + cls + ' data-path="' + escAttr(fullPath) + '">' +
            '<td><input type="checkbox" ' + (selected.has(fullPath) ? 'checked' : '') +
            ' onchange="toggleSelect(\'' + escAttr(fullPath) + '\', this.checked)"></td>' +
            '<td><div class="file-name" onclick="itemClick(\'' + escAttr(fullPath) + '\', ' + entry.is_dir + ')">' +
            '<span class="icon">' + icon + '</span>' +
            '<span>' + escHtml(entry.name) + '</span></div></td>' +
            '<td class="file-size">' + formatSize(entry.size) + '</td></tr>';
    }

    table += '</tbody></table>';
    container.innerHTML = table;
}

function itemClick(path, isDir) {
    if (isDir) {
        navigate(path);
    } else {
        window.open('/filebrowser/api/download?path=' + encodeURIComponent(path), '_blank');
    }
}

function toggleSelect(path, checked) {
    if (checked) selected.add(path); else selected.delete(path);
    // Update row highlight
    document.querySelectorAll('.file-list tr[data-path]').forEach(tr => {
        tr.classList.toggle('selected', selected.has(tr.dataset.path));
    });
}

function promptNewFolder() {
    showModal('New Folder', '', function(name) {
        if (!name) return;
        const path = currentPath ? currentPath + '/' + name : name;
        api('POST', '/filebrowser/api/mkdir', { path: path })
            .then(() => navigate(currentPath));
    });
}

function deleteSelected() {
    if (selected.size === 0) return;
    const items = Array.from(selected);
    if (!confirm('Delete ' + items.length + ' item(s)?')) return;

    Promise.all(items.map(path =>
        api('DELETE', '/filebrowser/api/delete', { path: path })
    )).then(() => navigate(currentPath));
}

function uploadFiles(files) {
    if (!files || files.length === 0) return;
    const progress = document.getElementById('upload-progress');
    progress.style.display = 'block';
    progress.textContent = 'Uploading ' + files.length + ' file(s)...';

    const formData = new FormData();
    for (const f of files) formData.append('files', f);

    fetch('/filebrowser/api/upload?path=' + encodeURIComponent(currentPath), {
        method: 'POST',
        body: formData,
    })
    .then(r => r.json())
    .then(data => {
        progress.style.display = 'none';
        navigate(currentPath);
    })
    .catch(err => {
        progress.textContent = 'Upload failed: ' + err;
        setTimeout(() => { progress.style.display = 'none'; }, 3000);
    });

    // Reset file input
    document.getElementById('file-input').value = '';
}

// Drag and drop
const dropZone = document.getElementById('drop-zone');
const body = document.body;

['dragenter', 'dragover'].forEach(evt => {
    body.addEventListener(evt, e => {
        e.preventDefault();
        dropZone.style.display = 'block';
        dropZone.classList.add('active');
    });
});
['dragleave', 'drop'].forEach(evt => {
    dropZone.addEventListener(evt, e => {
        e.preventDefault();
        dropZone.classList.remove('active');
    });
});
body.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('active');
    if (e.dataTransfer.files.length > 0) uploadFiles(e.dataTransfer.files);
});

// Modal
function showModal(title, defaultVal, callback) {
    document.getElementById('modal-title').textContent = title;
    const input = document.getElementById('modal-input');
    input.value = defaultVal;
    modalCallback = callback;
    document.getElementById('modal-overlay').classList.add('show');
    setTimeout(() => input.focus(), 50);
}
function modalConfirm() {
    const val = document.getElementById('modal-input').value.trim();
    document.getElementById('modal-overlay').classList.remove('show');
    if (modalCallback) modalCallback(val);
    modalCallback = null;
}
function modalCancel() {
    document.getElementById('modal-overlay').classList.remove('show');
    modalCallback = null;
}

const folderIcons = {
    'Audio Loops':          '\u{1F501}',  // repeat
    'Audio Recordings':     '\u{1F3A4}',  // microphone
    'Audio Samples':        '\u{1F3B5}',  // musical note
    'Audio Tracks':         '\u{1F3B6}',  // musical notes
    'Speaker Cabinets IRs': '\u{1F50A}',  // speaker loud
    'Hydrogen Drumkits':    '\u{1F941}',  // drum
    'Reverb IRs':           '\u{1F30A}',  // wave
    'MIDI Clips':           '\u{1F3B9}',  // musical keyboard
    'MIDI Songs':           '\u{1F3BC}',  // musical score
    'SF2 Instruments':      '\u{1F3B7}',  // saxophone
    'SFZ Instruments':      '\u{1F3BB}',  // violin
    'Aida DSP Models':      '\u{1F9E0}',  // brain
    'NAM Models':           '\u{26A1}',   // lightning
};

const fileExtIcons = {
    'wav':  '\u{1F4BF}',  // optical disc
    'flac': '\u{1F4BF}',
    'aiff': '\u{1F4BF}',
    'aif':  '\u{1F4BF}',
    'w64':  '\u{1F4BF}',
    'ogg':  '\u{1F3B5}',
    'mp3':  '\u{1F3B5}',
    'mid':  '\u{1F3B9}',
    'midi': '\u{1F3B9}',
    'sf2':  '\u{1F3B7}',
    'sf3':  '\u{1F3B7}',
    'sfz':  '\u{1F3BB}',
    'h2drumkit': '\u{1F941}',
    'aidax': '\u{1F9E0}',
    'nam':  '\u{26A1}',
    'json': '\u{1F4C4}',
};

function getIcon(name, isDir) {
    if (isDir) {
        return folderIcons[name] || '\u{1F4C1}';
    }
    const ext = name.split('.').pop().toLowerCase();
    return fileExtIcons[ext] || '\u{1F4C4}';
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
    return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

// Initial load
navigate('');
</script>
</body>
</html>
